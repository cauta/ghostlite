name = "ghostlite"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "apps/web/.vercel/output/static"

# ---------- D1 Database ----------
[[d1_databases]]
binding = "DB"
database_name = "ghostlite-db"
database_id = "REPLACE_ME_D1_ID"
migrations_dir = "migrations"

# ---------- R2 Object Storage ----------
[[r2_buckets]]
binding = "R2"
bucket_name = "ghostlite-content"

# ---------- KV Cache ----------
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_ME_KV_ID"

# ---------- Public vars ----------
[vars]
SITE_NAME = "Ghostlite"
ACTIVE_THEME = "default"

# ---------- Paid-tier resources (uncomment after upgrading Workers plan) ----------
# [triggers]
# crons = ["*/5 * * * *"]
